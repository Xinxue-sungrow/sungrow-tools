<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Field Action Report Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
padding:40px;
background:#f4f6f8;
}

h1{
color:#1e3a8a;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

.add{
background:green;
color:white;
}

.submit{
background:#2563eb;
color:white;
margin-top:30px;
}

input,select{
padding:8px;
margin-top:5px;
width:300px;
}

</style>

</head>

<body>

<h1>Field Action Report Generator</h1>

<div class="card">

<label>Site Name</label><br>
<input id="siteName">

</div>

<div id="actions"></div>

<button class="add" onclick="addAction()">+ Add More Action</button>

<br>

<button class="submit" onclick="submitReport()">Submit</button>

<script>

let actionCount = 0

function addAction(){

actionCount++

const container = document.getElementById("actions")

const card = document.createElement("div")

card.className="card"

card.innerHTML=`

<h3>Action ${actionCount}</h3>

<label>Action Type</label><br>

<select>
<option>AC Test</option>
<option>DC Test</option>
<option>Inverter Check</option>
<option>Cable Inspection</option>
<option>Ground Test</option>
<option>Other</option>
</select>

<br><br>

<label>Upload Photos</label><br>
<input type="file" multiple>

`

container.appendChild(card)

}

addAction()

async function submitReport(){

if(!confirm("Finish Summarize?")) return

const { jsPDF } = window.jspdf

const doc = new jsPDF()

let y = 20

const siteName=document.getElementById("siteName").value

doc.setFontSize(16)
doc.text("Field Action Report",10,10)

doc.setFontSize(12)
doc.text("Site Name: "+siteName,10,y)

y+=10

const actions=document.querySelectorAll("#actions .card")

for(let i=0;i<actions.length;i++){

const type=actions[i].querySelector("select").value

doc.text("Action "+(i+1),10,y)
y+=6

doc.text("Type: "+type,10,y)
y+=8

const files=actions[i].querySelector("input").files

for(let file of files){

const img=await fileToDataURL(file)

doc.addImage(img,"JPEG",10,y,50,40)

y+=45

}

y+=5

}

doc.save("Field_Report.pdf")

}

function fileToDataURL(file){

return new Promise(resolve=>{

const reader=new FileReader()

reader.onload=e=>resolve(e.target.result)

reader.readAsDataURL(file)

})

}

</script>

</body>

</html>
